<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>NQ Ratchet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070b14;color:#c8d6e5;font-family:'JetBrains Mono','SF Mono',monospace;font-size:13px;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:16px 12px 80px}
.hdr{margin-bottom:20px;border-bottom:1px solid #1a2035;padding-bottom:12px}
.hdr h1{font-size:11px;letter-spacing:3px;color:#3d5a80;font-weight:600;margin:0}
.hdr p{font-size:10px;color:#2a3a55;margin-top:2px}
.card{background:#0d1321;border:1px solid #1a2035;border-radius:8px;padding:16px;margin-bottom:16px}
.lbl{font-size:10px;letter-spacing:1.5px;color:#3d5a80;margin-bottom:8px;font-weight:500}
.row{display:flex;gap:8px;align-items:stretch}
.row input{flex:1;background:#111827;border:1px solid #1f2d44;border-radius:6px;padding:12px 12px 12px 28px;color:#e2e8f0;font-size:20px;font-family:inherit;font-weight:500;outline:none;width:100%}
.row .small-input{font-size:16px;padding:12px;text-align:center;flex:0 0 80px}
.dollar{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#3d5a80;font-size:18px;font-weight:300}
.inp-wrap{flex:1;position:relative}
.btn{background:#0ea5e9;color:#020617;border:none;border-radius:6px;padding:0 20px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.btn:active{background:#38bdf8}
.hero{background:linear-gradient(135deg,#0d1a2e,#0d1321);border:1px solid #1a2035;border-radius:10px;padding:20px 16px;margin-bottom:16px;text-align:center;transition:all .3s}
.hero.flash{background:linear-gradient(135deg,#0d2818,#0d1321);border-color:#166534}
.hero .sub{font-size:10px;letter-spacing:2px;color:#4a6080;margin-bottom:4px}
.hero .big{font-size:48px;font-weight:700;color:#e2e8f0;line-height:1;display:inline}
.hero .inst{font-size:24px;font-weight:600;color:#0ea5e9;margin-left:10px}
.hero .info{font-size:11px;color:#4a6080;margin-top:6px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.acct{background:#0d1321;border:1px solid #1a2035;border-radius:8px;padding:12px 10px}
.acct.bust{background:#0d0d0d;border-color:#1a1111;opacity:.5}
.acct .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.acct .letter{font-weight:700;font-size:14px}
.acct .surv{font-size:10px;color:#3d5a80;margin-left:6px}
.acct .pos{font-size:11px;color:#4a6080}
.acct .bal{font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:2px}
.acct .pct{font-size:10px;margin-bottom:6px}
.green{color:#4ade80}.red{color:#f87171}
.bar-bg{height:3px;background:#1a2035;border-radius:2px;overflow:hidden}
.bar{height:100%;border-radius:2px;opacity:.6;transition:width .3s}
.bar-lbl{font-size:9px;color:#2a3a55;margin-top:3px}
.summary{background:#0d1321;border:1px solid #1a2035;border-radius:8px;padding:12px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:11px}
.summary .k{color:#3d5a80}.summary .v{color:#e2e8f0;font-weight:500}
.hist-btn{background:none;border:none;color:#3d5a80;cursor:pointer;font-family:inherit;font-size:11px;padding:4px 0}
.hist{margin-top:8px;max-height:300px;overflow:auto}
.hist-row{padding:6px 8px;border-bottom:1px solid #111827;font-size:10px;display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center}
.reset-wrap{text-align:center;padding-top:8px;border-top:1px solid #111827;margin-top:16px}
.reset{background:none;border:1px solid #1f2020;border-radius:6px;color:#3d3030;padding:8px 24px;font-family:inherit;font-size:11px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>NQ RATCHET</h1>
    <p>1000/1500/1700/2200 &middot; D-up A-down &middot; 7+&mu; &middot; 50m cap</p>
  </div>

  <div class="card">
    <div class="lbl">BROKER BALANCE</div>
    <div class="row">
      <div class="inp-wrap">
        <span class="dollar">$</span>
        <input id="balInput" type="text" inputmode="decimal" placeholder="20,000"/>
      </div>
      <input id="posInput" class="small-input" type="text" inputmode="numeric" placeholder="pos"/>
      <button class="btn" onclick="doUpdate()">Update</button>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:6px">
      <span style="font-size:9px;color:#2a3a55">Enter broker balance</span>
      <span style="font-size:9px;color:#2a3a55">Last pos traded</span>
    </div>
  </div>

  <div class="hero" id="hero">
    <div class="sub">NEXT TRADE</div>
    <div><span class="big" id="tradeMain">4</span><span class="inst" id="tradeInst">MNQ</span></div>
    <div class="info" id="tradeInfo">4&mu; &middot; $7.60 RT</div>
  </div>

  <div class="grid" id="acctGrid"></div>

  <div class="summary" id="summaryGrid"></div>

  <div>
    <button class="hist-btn" onclick="toggleHist()"><span id="histArrow">&#9654;</span> History (<span id="histCount">0</span>)</button>
    <div class="hist" id="histList" style="display:none"></div>
  </div>

  <div class="reset-wrap">
    <button class="reset" onclick="doReset()">Reset</button>
  </div>
</div>

const PROFILES = [
  {label:'A',surv:1000,color:'#4ade80',dep:3800.00},
  {label:'B',surv:1500,color:'#38bdf8',dep:4800.00},
  {label:'C',surv:1700,color:'#c084fc',dep:5200.00},
  {label:'D',surv:2200,color:'#fb923c',dep:6200.00}
];
const COMM_MNQ=0.95,COMM_NQ=2.88;

function commRT(m){return Math.floor(m/10)*COMM_NQ*2+(m%10)*COMM_MNQ*2}

// ─── TABLE LOOKUP ───────────────────────────────────────────────────────
function lookup(broker){
  // Find highest entry where broker >= threshold
  let idx = -1;
  for(let i=0;i<T.length;i++){
    if(broker >= T[i].b - 0.50) idx = i;
    else break;
  }
  if(idx < 0) return {total:0, rounded:[0,0,0,0], bals:[0,0,0,0]};
  
  const e = T[idx];
  // Interpolate per-account balances within this segment
  if(idx < T.length-1){
    const next = T[idx+1];
    const frac = Math.min(1, Math.max(0, (broker - e.b) / (next.b - e.b)));
    const bals = e.a.map((b,i) => Math.round((b + frac*(next.a[i]-b))*100)/100);
    return {total:e.t, rounded:e.r, bals:bals};
  }
  return {total:e.t, rounded:e.r, bals:e.a};
}

function fmtPos(m){
  if(m===0) return '\u2014';
  const mi=Math.floor(m/10),r=m%10;
  if(mi===0) return r+'\u03BC';
  if(r===0) return mi+'m';
  return mi+'m+'+r+'\u03BC';
}
function fmtMoney(v){
  if(Math.abs(v)>=1e6) return '$'+(v/1e6).toFixed(2)+'M';
  return '$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

// ─── STATE ──────────────────────────────────────────────────────────────
let state = null;
const SK = 'nq-ratchet-v3';

function loadState(){
  try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null}catch(e){return null}
}
function saveState(s){
  try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){}
}

function initState(){
  return {broker:20000, peakPos:4, history:[]};
}

// ─── RENDER ─────────────────────────────────────────────────────────────
function render(){
  if(!state) return;
  const {total, rounded, bals} = lookup(state.broker);
  const pos = Math.max(total, state.peakPos);
  
  // If peakPos forces a higher position than the table gives,
  // we need the rounded breakdown from the peak entry
  let displayRounded = rounded;
  let displayBals = bals;
  if(pos > total){
    // Find the entry matching peakPos
    for(let i=T.length-1;i>=0;i--){
      if(T[i].t === pos){displayRounded=T[i].r; break}
      if(T[i].t < pos){displayRounded=T[i].r; break}
    }
  }
  
  // Trade display
  const mi=Math.floor(pos/10), rem=pos%10;
  let mainTxt, instTxt;
  if(pos===0){mainTxt='0';instTxt='';}
  else if(mi===0){mainTxt=String(rem);instTxt='MNQ';}
  else if(rem===0){mainTxt=String(mi);instTxt='NQ';}
  else{mainTxt=mi+'+'+rem;instTxt='NQ+MNQ';}
  
  document.getElementById('tradeMain').textContent=mainTxt;
  document.getElementById('tradeInst').textContent=instTxt;
  document.getElementById('tradeInfo').textContent=fmtPos(pos)+' \u00B7 $'+commRT(pos).toFixed(2)+' RT';
  document.getElementById('balInput').value=Math.round(state.broker).toLocaleString('en-US');
  document.getElementById('posInput').value=pos;
  
  // Account cards
  const grid=document.getElementById('acctGrid');
  grid.innerHTML='';
  for(let i=0;i<4;i++){
    const p=PROFILES[i], bal=displayBals[i], posI=displayRounded[i];
    const pctChg=((bal/p.dep)-1)*100;
    const dead=bal<=0;
    
    // Find step info from individual ratchet
    const stepInfo = getStepInfo(i, bal);
    
    const card=document.createElement('div');
    card.className='acct'+(dead?' bust':'');
    
    let barHtml='';
    if(!dead && stepInfo.nextThresh){
      const pct=Math.min(100,Math.max(0,(bal-stepInfo.currThresh)/(stepInfo.nextThresh-stepInfo.currThresh)*100));
      barHtml='<div class="bar-bg"><div class="bar" style="width:'+pct+'%;background:'+p.color+'"></div></div>'+
              '<div class="bar-lbl">'+fmtMoney(stepInfo.nextThresh-bal)+' to step '+(stepInfo.step+2)+' ('+fmtPos(stepInfo.nextMicros)+')</div>';
    }
    
    card.innerHTML=
      '<div class="top"><div><span class="letter" style="color:'+p.color+'">'+p.label+'</span><span class="surv">'+p.surv+'</span></div>'+
      '<span class="pos">'+(dead?'BUST':fmtPos(posI))+'</span></div>'+
      '<div class="bal">'+(dead?'\u2014':fmtMoney(bal))+'</div>'+
      '<div class="pct '+(pctChg>=0?'green':'red')+'">'+(pctChg>=0?'+':'')+pctChg.toFixed(1)+'% \u00B7 step '+(stepInfo.step+1)+'</div>'+
      barHtml;
    grid.appendChild(card);
  }
  
  // Summary
  const totalBal=displayBals.reduce((a,b)=>a+b,0);
  const totalDep=PROFILES.reduce((a,p)=>a+p.dep,0);
  const pnlPct=((totalBal/totalDep)-1)*100;
  const alive=displayBals.filter(b=>b>0).length;
  document.getElementById('summaryGrid').innerHTML=
    '<div><span class="k">Total: </span><span class="v">'+fmtMoney(totalBal)+'</span></div>'+
    '<div><span class="k">P&L: </span><span class="v '+(pnlPct>=0?'green':'red')+'">'+(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%</span></div>'+
    '<div><span class="k">Alive: </span><span class="v">'+alive+'/4</span></div>'+
    '<div><span class="k">Updates: </span><span class="v">'+state.history.length+'</span></div>';
  
  // History count
  document.getElementById('histCount').textContent=state.history.length;
  renderHist();
}

// Individual account ratchet tables for step info display
const ACCT_TABLES = [];
(function(){
  const SL=150,USD=2,DD=301;
  function crt(m){return Math.floor(m/10)*2.88*2+(m%10)*0.95*2}
  function mg(m){const mi=Math.floor(m/10),r=m%10;if(mi<=20)return m*100;return 20*10*100+(mi-20)*20276+r*100}
  for(let pi=0;pi<4;pi++){
    const surv=Math.max((PROFILES[pi].surv+SL)*USD,SL*USD);
    const steps=[];for(let m=1;m<=10;m++)steps.push(m);for(let m=20;m<=500;m+=10)steps.push(m);
    const raw=steps.map(m=>({t:Math.round((m*surv+mg(m)+DD*crt(m))*100)/100,m}));
    const tbl=[];
    for(let i=0;i<raw.length;i++){
      let skip=false;
      for(let j=i+1;j<raw.length;j++){if(raw[j].t<=raw[i].t&&raw[j].m>raw[i].m){skip=true;break}}
      if(!skip)tbl.push(raw[i]);
    }
    ACCT_TABLES.push(tbl);
  }
})();

function getStepInfo(ai, bal){
  const tbl=ACCT_TABLES[ai];
  let step=-1;
  for(let i=0;i<tbl.length;i++){if(bal>=tbl[i].t-0.50)step=i;else break}
  const nextThresh=(step+1<tbl.length)?tbl[step+1].t:null;
  const currThresh=step>=0?tbl[step].t:(tbl[0]?tbl[0].t:0);
  const nextMicros=(step+1<tbl.length)?tbl[step+1].m:0;
  return {step, currThresh, nextThresh, nextMicros};
}

function renderHist(){
  const list=document.getElementById('histList');
  if(list.style.display==='none')return;
  list.innerHTML='';
  (state.history||[]).slice(0,30).forEach(h=>{
    const row=document.createElement('div');
    row.className='hist-row';
    const d=new Date(h.ts);
    const dateStr=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    row.innerHTML=
      '<span style="color:#2a3a55">'+dateStr+'</span>'+
      '<span style="color:#4a6080">'+fmtMoney(h.broker)+'</span>'+
      '<span class="'+(h.delta>=0?'green':'red')+'">'+(h.delta>=0?'+':'')+fmtMoney(Math.abs(h.delta))+'</span>'+
      '<span style="color:#4a6080">'+fmtPos(h.pos)+'</span>';
    list.appendChild(row);
  });
}

// ─── ACTIONS ────────────────────────────────────────────────────────────
function doUpdate(){
  const balStr=document.getElementById('balInput').value.replace(/[,$\s]/g,'');
  const posStr=document.getElementById('posInput').value.replace(/[^0-9]/g,'');
  const broker=parseFloat(balStr);
  const posTrd=parseInt(posStr)||0;
  if(isNaN(broker)||broker<0)return;
  
  const oldBroker=state.broker;
  const {total}=lookup(broker);
  const newPos=Math.max(total, posTrd);
  
  state.broker=broker;
  state.peakPos=newPos;
  state.history=[{ts:Date.now(),broker:Math.round(broker*100)/100,delta:Math.round((broker-oldBroker)*100)/100,pos:newPos},...(state.history||[])].slice(0,100);
  saveState(state);
  render();
  
  // Flash
  const hero=document.getElementById('hero');
  hero.classList.add('flash');
  setTimeout(()=>hero.classList.remove('flash'),600);
}

function doReset(){
  if(!confirm('Reset to initial state? This clears all history.'))return;
  state=initState();
  saveState(state);
  render();
}

function toggleHist(){
  const list=document.getElementById('histList');
  const arrow=document.getElementById('histArrow');
  if(list.style.display==='none'){list.style.display='block';arrow.innerHTML='&#9660;';renderHist();}
  else{list.style.display='none';arrow.innerHTML='&#9654;';}
}

// ─── INIT ───────────────────────────────────────────────────────────────
document.getElementById('balInput').addEventListener('keydown',e=>{if(e.key==='Enter')doUpdate()});
document.getElementById('posInput').addEventListener('keydown',e=>{if(e.key==='Enter')doUpdate()});

state=loadState()||initState();
render();
</script>
</body>
</html>
