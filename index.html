<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NQ Ratchet</title>
<style>
  :root {
    --bg: #0c0e14; --card: #111520; --border: #1a2030;
    --text: #d4d7dd; --dim: #606880; --faint: #404860;
    --cyan: #4fc3f7; --green: #5ab87a; --red: #e85d4a; --amber: #d4a843; --blue: #4a9de8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 16px 12px;
    max-width: 480px; margin: 0 auto;
    -webkit-text-size-adjust: 100%;
  }
  .header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 14px; }
  .header h1 { font-size: 11px; color: var(--dim); letter-spacing: 2px; font-weight: 400; }
  .header p { font-size: 10px; color: var(--faint); margin-top: 2px; }
  .input-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .input-label { font-size: 11px; color: var(--dim); letter-spacing: 1px; margin-bottom: 8px; }
  .input-row { display: flex; gap: 8px; }
  .input-wrap { position: relative; flex: 1; }
  .input-wrap .dollar { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #506070; font-size: 18px; }
  .bal-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 12px 12px 28px; color: #e8eaf0; font-size: 20px;
    font-family: inherit; outline: none;
  }
  .bal-input:focus { border-color: #2a4060; }
  .update-btn {
    background: #151a25; border: 1px solid #2a4060; border-radius: 6px;
    padding: 12px 20px; color: var(--faint); font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: default; white-space: nowrap;
  }
  .update-btn.active { background: #1a3a5f; color: var(--cyan); cursor: pointer; }
  .delta-preview { font-size: 11px; margin-top: 6px; }
  .position-box {
    background: #0a1628; border: 2px solid #1e3a5f; border-radius: 10px;
    padding: 20px 16px; text-align: center; margin-bottom: 14px;
  }
  .position-box.dead { background: #1a0a0a; border-color: #3a1a1a; }
  .position-box .label { font-size: 11px; color: var(--dim); letter-spacing: 1px; }
  .position-box .size { font-size: 42px; font-weight: 800; color: var(--cyan); margin-top: 4px; line-height: 1.1; }
  .position-box.dead .size { color: var(--red); }
  .position-box .meta { font-size: 12px; color: #506070; margin-top: 6px; }
  .thresholds { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 11px; flex-wrap: wrap; }
  .thresholds span { color: #506070; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .acct-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .acct-card.dead { border-color: #2a1515; opacity: 0.45; }
  .acct-header { display: flex; justify-content: space-between; align-items: center; }
  .acct-name { font-size: 13px; font-weight: 700; }
  .acct-surv { font-weight: 400; font-size: 10px; color: #506070; }
  .acct-pos { font-size: 12px; color: #8090a0; }
  .acct-bal { font-size: 16px; font-weight: 600; color: #c8ccd4; margin-top: 4px; }
  .acct-pct { font-size: 10px; margin-top: 2px; }
  .progress-bar { height: 3px; background: #1a2030; border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .progress-fill { height: 100%; border-radius: 2px; opacity: 0.5; }
  .progress-label { font-size: 9px; color: var(--faint); margin-top: 2px; }
  .hist-btn { background: transparent; border: none; color: #506070; font-size: 11px; cursor: pointer; font-family: inherit; padding: 4px 0; }
  .hist-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--card); font-size: 11px; }
  .reset-area { text-align: center; margin-top: 20px; padding-bottom: 24px; }
  .reset-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 24px; color: var(--faint); font-size: 11px; font-family: inherit; cursor: pointer;
  }
  .reset-btn.confirm { background: #3a1515; border-color: #5a2020; color: var(--red); }
  .cancel-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 16px; color: #506070; font-size: 11px; font-family: inherit; cursor: pointer; margin-left: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>NQ RATCHET</h1>
  <p>1300/1700/2061/2500 — D-up A-down — 7+ — 50m cap</p>
</div>

<div class="input-section">
  <div class="input-label">CURRENT BROKER BALANCE</div>
  <div class="input-row">
    <div class="input-wrap">
      <span class="dollar">$</span>
      <input type="text" inputmode="decimal" id="balInput" class="bal-input" placeholder="">
    </div>
    <button id="updateBtn" class="update-btn" onclick="handleUpdate()">Update</button>
  </div>
  <div id="deltaPreview" class="delta-preview"></div>
</div>

<div id="positionBox" class="position-box">
  <div class="label">TRADE SIZE</div>
  <div class="size" id="tradeSize">—</div>
  <div class="meta" id="tradeMeta"></div>
  <div class="thresholds" id="thresholds"></div>
</div>

<div class="grid" id="acctGrid"></div>

<div>
  <button class="hist-btn" id="histBtn" onclick="toggleHistory()">▶ History (0)</button>
  <div id="histList" style="max-height:180px;overflow-y:auto;margin-top:6px;display:none"></div>
</div>

<div class="reset-area">
  <button id="resetBtn" class="reset-btn" onclick="handleReset()">Reset accounts</button>
  <button id="cancelBtn" class="cancel-btn" onclick="cancelReset()" style="display:none">Cancel</button>
</div>

<script>
const SURVS = [1300, 1700, 2061, 2500];
const DEPS = [3819.50, 4619.50, 5341.50, 6219.50];
const CAP = 500, ROUND_THR = 7, COMM_NQ = 2.88, COMM_MNQ = 0.95;
const COLORS = ["#e85d4a", "#d4a843", "#4a9de8", "#5ab87a"];
const LABELS = ["A", "B", "C", "D"];
const SKEY = "nq-ratchet-v4";

const RT = [
  [[3150.1,1],[6300.2,2],[9450.3,3],[12600.4,4],[15750.5,5],[18900.6,6],[22050.7,7],[25200.8,8],[28350.9,9],[30455.04,10],[60910.08,20],[91365.12,30],[121820.16,40],[152275.2,50],[182730.24,60],[213185.28,70],[243640.32,80],[274095.36,90],[304550.4,100],[335005.44,110],[365460.48,120],[395915.52,130],[426370.56,140],[456825.6,150],[487280.64,160],[517735.68,170],[548190.72,180],[578645.76,190],[609100.8,200],[658831.84,210],[708562.88,220],[758293.92,230],[808024.96,240],[857756.0,250],[907487.04,260],[957218.08,270],[1006949.12,280],[1056680.16,290],[1106411.2,300],[1156142.24,310],[1205873.28,320],[1255604.32,330],[1305335.36,340],[1355066.4,350],[1404797.44,360],[1454528.48,370],[1504259.52,380],[1553990.56,390],[1603721.6,400],[1653452.64,410],[1703183.68,420],[1752914.72,430],[1802645.76,440],[1852376.8,450],[1902107.84,460],[1951838.88,470],[2001569.92,480],[2051300.96,490],[2101032.0,500]],
  [[3950.1,1],[7900.2,2],[11850.3,3],[15800.4,4],[19750.5,5],[23700.6,6],[27650.7,7],[31600.8,8],[35550.9,9],[38455.04,10],[76910.08,20],[115365.12,30],[153820.16,40],[192275.2,50],[230730.24,60],[269185.28,70],[307640.32,80],[346095.36,90],[384550.4,100],[423005.44,110],[461460.48,120],[499915.52,130],[538370.56,140],[576825.6,150],[615280.64,160],[653735.68,170],[692190.72,180],[730645.76,190],[769100.8,200],[826831.84,210],[884562.88,220],[942293.92,230],[1000024.96,240],[1057756.0,250],[1115487.04,260],[1173218.08,270],[1230949.12,280],[1288680.16,290],[1346411.2,300],[1404142.24,310],[1461873.28,320],[1519604.32,330],[1577335.36,340],[1635066.4,350],[1692797.44,360],[1750528.48,370],[1808259.52,380],[1865990.56,390],[1923721.6,400],[1981452.64,410],[2039183.68,420],[2096914.72,430],[2154645.76,440],[2212376.8,450],[2270107.84,460],[2327838.88,470],[2385569.92,480],[2443300.96,490],[2501032.0,500]],
  [[4672.1,1],[9344.2,2],[14016.3,3],[18688.4,4],[23360.5,5],[28032.6,6],[32704.7,7],[37376.8,8],[42048.9,9],[45675.04,10],[91350.08,20],[137025.12,30],[182700.16,40],[228375.2,50],[274050.24,60],[319725.28,70],[365400.32,80],[411075.36,90],[456750.4,100],[502425.44,110],[548100.48,120],[593775.52,130],[639450.56,140],[685125.6,150],[730800.64,160],[776475.68,170],[822150.72,180],[867825.76,190],[913500.8,200],[978451.84,210],[1043402.88,220],[1108353.92,230],[1173304.96,240],[1238256.0,250],[1303207.04,260],[1368158.08,270],[1433109.12,280],[1498060.16,290],[1563011.2,300],[1627962.24,310],[1692913.28,320],[1757864.32,330],[1822815.36,340],[1887766.4,350],[1952717.44,360],[2017668.48,370],[2082619.52,380],[2147570.56,390],[2212521.6,400],[2277472.64,410],[2342423.68,420],[2407374.72,430],[2472325.76,440],[2537276.8,450],[2602227.84,460],[2667178.88,470],[2732129.92,480],[2797080.96,490],[2862032.0,500]],
  [[5550.1,1],[11100.2,2],[16650.3,3],[22200.4,4],[27750.5,5],[33300.6,6],[38850.7,7],[44400.8,8],[49950.9,9],[54455.04,10],[108910.08,20],[163365.12,30],[217820.16,40],[272275.2,50],[326730.24,60],[381185.28,70],[435640.32,80],[490095.36,90],[544550.4,100],[599005.44,110],[653460.48,120],[707915.52,130],[762370.56,140],[816825.6,150],[871280.64,160],[925735.68,170],[980190.72,180],[1034645.76,190],[1089100.8,200],[1162831.84,210],[1236562.88,220],[1310293.92,230],[1384024.96,240],[1457756.0,250],[1531487.04,260],[1605218.08,270],[1678949.12,280],[1752680.16,290],[1826411.2,300],[1900142.24,310],[1973873.28,320],[2047604.32,330],[2121335.36,340],[2195066.4,350],[2268797.44,360],[2342528.48,370],[2416259.52,380],[2489990.56,390],[2563721.6,400],[2637452.64,410],[2711183.68,420],[2784914.72,430],[2858645.76,440],[2932376.8,450],[3006107.84,460],[3079838.88,470],[3153569.92,480],[3227300.96,490],[3301032.0,500]]
];

let state = null;
let confirmingReset = false;
let histVisible = false;

function commRt(m) { return Math.floor(m/10)*COMM_NQ*2 + (m%10)*COMM_MNQ*2; }
function marginF(m) { var mi=Math.floor(m/10),r=m%10; return mi<=20?m*100:20*10*100+(mi-20)*20276+r*100; }
function fmt(m) { var mi=Math.floor(m/10),r=m%10; return mi===0?r+"\u03BC":r===0?mi+"m":mi+"m+"+r+"\u03BC"; }
function fmtOrder(t) { if(!t)return"\u2014"; var mi=Math.floor(t/10),r=t%10; if(r===0&&mi>0)return mi+" NQ"; if(mi===0)return r+" MNQ"; return mi+" NQ + "+r+" MNQ"; }
function fmtUsd(v) { return "$"+Math.round(v).toLocaleString(); }

function computePositions(bals, peakSteps) {
  var accts = [], actual = [], total = 0;
  for (var i = 0; i < 4; i++) {
    if (bals[i] <= 0) { accts.push({label:LABELS[i],bal:0,alive:false,theo:0,actual:0,step:-1,peakStep:peakSteps[i]}); actual.push(0); continue; }
    var cs=-1, rt=RT[i];
    for (var si=0;si<rt.length;si++) { if(bals[i]>=rt[si][0])cs=si; else break; }
    var ps = Math.max(cs, peakSteps[i]);
    if (ps<0) { accts.push({label:LABELS[i],bal:bals[i],alive:false,theo:0,actual:0,step:-1,peakStep:ps}); actual.push(0); continue; }
    var tm = rt[ps][1];
    if (bals[i] < marginF(tm)) { for(var j=ps;j>=0;j--){if(bals[i]>=marginF(rt[j][1])){tm=rt[j][1];break;}} }
    accts.push({label:LABELS[i],bal:bals[i],alive:true,theo:tm,actual:tm,step:ps,peakStep:ps});
    actual.push(tm);
  }
  total = actual.reduce(function(s,v){return s+v},0);

  if (total > CAP) {
    var sc=CAP/total; actual=accts.map(function(a){return Math.floor(a.theo*sc)});
    var rem=CAP-actual.reduce(function(s,v){return s+v},0);
    var fr=accts.map(function(a,i){return{f:a.theo*sc-actual[i],i:i}}).sort(function(a,b){return b.f-a.f});
    for(var k=0;k<fr.length&&rem>0;k++){if(accts[fr[k].i].alive){actual[fr[k].i]++;rem--;}}
    total=actual.reduce(function(s,v){return s+v},0);
  }

  if (total > 9) {
    var mf=Math.floor(total/10), left=total%10;
    if (left > 0) {
      var rounded = left>=ROUND_THR ? (mf+1)*10 : mf*10;
      if (rounded>CAP) rounded=mf*10;
      var diff=rounded-total;
      if (diff>0) { actual[3]+=diff; }
      else if (diff<0) { var rm=-diff; for(var idx=0;idx<4&&rm>0;idx++){var take=Math.min(actual[idx],rm);actual[idx]-=take;rm-=take;} }
      total=actual.reduce(function(s,v){return s+v},0);
    }
  }

  for(var i=0;i<4;i++) accts[i].actual=actual[i];
  return {accts:accts, totalActual:total, commission:commRt(total)};
}

function loadState() {
  try { var s=localStorage.getItem(SKEY); if(s) return JSON.parse(s); } catch(e){}
  return {bals:DEPS.slice(), peakSteps:[-1,-1,-1,-1], history:[]};
}
function saveState() { try{localStorage.setItem(SKEY,JSON.stringify(state))}catch(e){} }

function render() {
  var bals=state.bals, peakSteps=state.peakSteps, history=state.history;
  var r=computePositions(bals,peakSteps), accts=r.accts, totalActual=r.totalActual, commission=r.commission;
  var totalBal=bals.reduce(function(s,v){return s+v},0);
  var anyAlive=accts.some(function(a){return a.alive});

  document.getElementById("balInput").placeholder = Math.round(totalBal).toLocaleString();

  var box=document.getElementById("positionBox");
  box.className = "position-box" + (anyAlive?"":" dead");
  document.getElementById("tradeSize").textContent = anyAlive ? fmtOrder(totalActual) : "ALL BUSTED";
  document.getElementById("tradeMeta").textContent = anyAlive&&totalActual>0 ? fmt(totalActual)+" combined \u2014 $"+commission.toFixed(2)+" RT comm" : "";

  // Step thresholds
  var thDiv=document.getElementById("thresholds"); thDiv.innerHTML="";
  if (anyAlive) {
    var upBal=null, downBal=null;
    for(var d=50;d<=500000;d+=50){
      if(!upBal){
        var tb=bals.map(function(b,i){return b<=0||totalActual===0?b:b+d*(accts[i].actual/totalActual)});
        var tp=peakSteps.slice();
        for(var i=0;i<4;i++){if(tb[i]>0){var cs=-1;for(var si=0;si<RT[i].length;si++){if(tb[i]>=RT[i][si][0])cs=si;else break}tp[i]=Math.max(cs,peakSteps[i])}}
        var tr=computePositions(tb,tp); if(tr.totalActual>totalActual)upBal=totalBal+d;
      }
      if(!downBal&&totalActual>0){
        var tb=bals.map(function(b,i){return b<=0||totalActual===0?b:Math.max(0,b-d*(accts[i].actual/totalActual))});
        var tr=computePositions(tb,peakSteps); if(tr.totalActual<totalActual)downBal=totalBal-d;
      }
      if(upBal&&downBal)break;
    }
    var html="";
    if(downBal!=null) html+='<span><span style="color:var(--red)">\u2193</span> step down at '+fmtUsd(downBal)+'</span>';
    if(upBal!=null) html+='<span><span style="color:var(--green)">\u2191</span> step up at '+fmtUsd(upBal)+'</span>';
    thDiv.innerHTML=html;
  }

  // Account cards
  var grid=document.getElementById("acctGrid"); grid.innerHTML="";
  for(var i=0;i<4;i++){
    var a=accts[i], pct=DEPS[i]>0?((a.bal-DEPS[i])/DEPS[i]*100):0;
    var rt=RT[i], nextTh=(a.step>=0&&a.step+1<rt.length)?rt[a.step+1][0]:null;
    var prog=nextTh&&a.bal>0&&a.step>=0?Math.min(100,Math.max(0,(a.bal-rt[a.step][0])/(nextTh-rt[a.step][0])*100)):0;
    var card=document.createElement("div"); card.className="acct-card"+(a.alive?"":" dead");
    var h='<div class="acct-header"><span class="acct-name" style="color:'+COLORS[i]+'">'+a.label+' <span class="acct-surv">'+SURVS[i]+'</span></span>';
    h+='<span class="acct-pos" style="color:'+(a.alive?"#8090a0":"#804040")+'">'+(a.alive?fmt(a.actual):"BUST")+'</span></div>';
    h+='<div class="acct-bal">'+fmtUsd(a.bal)+'</div>';
    h+='<div class="acct-pct" style="color:'+(pct>=0?"var(--green)":"var(--red)")+'">'+(pct>=0?"+":"")+pct.toFixed(1)+'% \u2014 step '+(a.step+1)+'</div>';
    if(a.alive&&nextTh){
      h+='<div class="progress-bar"><div class="progress-fill" style="width:'+prog+'%;background:'+COLORS[i]+'"></div></div>';
      h+='<div class="progress-label">'+fmtUsd(nextTh-a.bal)+' to step '+(a.step+2)+'</div>';
    }
    card.innerHTML=h; grid.appendChild(card);
  }

  document.getElementById("histBtn").textContent=(histVisible?"\u25BC":"\u25B6")+" History ("+history.length+")";
  if(histVisible&&history.length>0){
    var hl=document.getElementById("histList"); hl.style.display="block"; hl.innerHTML="";
    var show=history.slice().reverse().slice(0,30);
    for(var j=0;j<show.length;j++){
      var h=show[j];
      var row='<div class="hist-row"><span style="color:var(--faint)">'+new Date(h.ts).toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit"})+'</span>';
      row+='<span style="color:'+(h.delta>=0?"var(--green)":"var(--red)")+'">'+(h.delta>=0?"+":"")+"$"+Math.round(h.delta).toLocaleString()+'</span>';
      row+='<span style="color:#707880">'+fmtUsd(h.broker)+'</span></div>';
      hl.innerHTML+=row;
    }
  } else { document.getElementById("histList").style.display="none"; }
}

function handleUpdate() {
  var raw=document.getElementById("balInput").value.replace(/[,$\s]/g,"");
  var nb=parseFloat(raw); if(isNaN(nb)||nb<0)return;
  var bals=state.bals, peakSteps=state.peakSteps;
  var r=computePositions(bals,peakSteps), accts=r.accts, totalActual=r.totalActual;
  var totalBal=bals.reduce(function(s,v){return s+v},0);
  var delta=nb-totalBal;
  var newBals=bals.slice(), newPeaks=peakSteps.slice();

  if(totalActual>0&&delta!==0){
    for(var i=0;i<4;i++){
      if(accts[i].actual>0){
        newBals[i]=bals[i]+delta*(accts[i].actual/totalActual);
        if(newBals[i]<0)newBals[i]=0;
      }
    }
  }
  for(var i=0;i<4;i++){
    if(newBals[i]>0){var cs=-1;for(var si=0;si<RT[i].length;si++){if(newBals[i]>=RT[i][si][0])cs=si;else break}newPeaks[i]=Math.max(cs,peakSteps[i]);}
  }

  state.bals=newBals; state.peakSteps=newPeaks;
  state.history.push({ts:Date.now(),broker:nb,delta:delta,bals:newBals.slice()});
  saveState(); document.getElementById("balInput").value=""; document.getElementById("deltaPreview").innerHTML=""; render();
}

function handleReset() {
  if(!confirmingReset){confirmingReset=true;document.getElementById("resetBtn").className="reset-btn confirm";document.getElementById("resetBtn").textContent="Confirm reset";document.getElementById("cancelBtn").style.display="inline-block";return;}
  state={bals:DEPS.slice(),peakSteps:[-1,-1,-1,-1],history:[]};saveState();confirmingReset=false;
  document.getElementById("resetBtn").className="reset-btn";document.getElementById("resetBtn").textContent="Reset accounts";document.getElementById("cancelBtn").style.display="none";render();
}
function cancelReset(){confirmingReset=false;document.getElementById("resetBtn").className="reset-btn";document.getElementById("resetBtn").textContent="Reset accounts";document.getElementById("cancelBtn").style.display="none";}
function toggleHistory(){histVisible=!histVisible;render();}

// Input preview
document.getElementById("balInput").addEventListener("input",function(){
  var raw=this.value.replace(/[,$\s]/g,""),nb=parseFloat(raw),btn=document.getElementById("updateBtn"),prev=document.getElementById("deltaPreview");
  if(!this.value||isNaN(nb)||nb<0){btn.className="update-btn";prev.innerHTML="";return;}
  btn.className="update-btn active";
  var totalBal=state.bals.reduce(function(s,v){return s+v},0),d=nb-totalBal;
  prev.style.color=d>=0?"var(--green)":"var(--red)";
  prev.textContent=(d>=0?"+":"")+"$"+Math.round(d).toLocaleString()+" since last update";
});

document.getElementById("balInput").addEventListener("keydown",function(e){if(e.key==="Enter")handleUpdate()});

state = loadState();
render();
</script>
</body>
</html>
