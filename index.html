<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>NQ Ratchet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070b14;color:#c8d6e5;font-family:'JetBrains Mono','SF Mono',monospace;font-size:13px;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:16px 12px 80px}
.hdr{margin-bottom:20px;border-bottom:1px solid #1a2035;padding-bottom:12px}
.hdr h1{font-size:11px;letter-spacing:3px;color:#3d5a80;font-weight:600;margin:0}
.hdr p{font-size:10px;color:#2a3a55;margin-top:2px}
.card{background:#0d1321;border:1px solid #1a2035;border-radius:8px;padding:16px;margin-bottom:16px}
.lbl{font-size:10px;letter-spacing:1.5px;color:#3d5a80;margin-bottom:8px;font-weight:500}
.row{display:flex;gap:8px;align-items:stretch}
.row input{background:#111827;border:1px solid #1f2d44;border-radius:6px;color:#e2e8f0;font-family:inherit;font-weight:500;outline:none}
#balInput{flex:1;font-size:20px;padding:12px 12px 12px 28px;width:100%;min-width:0}
#posInput{flex:0 0 48px;font-size:14px;padding:12px 2px;text-align:center}
.dollar{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#3d5a80;font-size:18px;font-weight:300}
.inp-wrap{flex:1;position:relative}
.btn{background:#0ea5e9;color:#020617;border:none;border-radius:6px;padding:0 20px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.btn:active{background:#38bdf8}
.hero{background:linear-gradient(135deg,#0d1a2e,#0d1321);border:1px solid #1a2035;border-radius:10px;padding:20px 16px;margin-bottom:16px;text-align:center;transition:all .3s}
.hero.flash{background:linear-gradient(135deg,#0d2818,#0d1321)!important;border-color:#166534!important}
.hero .sub{font-size:10px;letter-spacing:2px;color:#4a6080;margin-bottom:4px}
.hero .big{font-size:48px;font-weight:700;color:#e2e8f0;line-height:1;display:inline}
.hero .inst{font-size:24px;font-weight:600;color:#0ea5e9;margin-left:10px}
.hero .info{font-size:11px;color:#4a6080;margin-top:6px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.acct{background:#0d1321;border:1px solid #1a2035;border-radius:8px;padding:12px 10px}
.acct.bust{background:#0d0d0d;border-color:#1a1111;opacity:.5}
.acct .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.acct .letter{font-weight:700;font-size:14px}
.acct .surv{font-size:10px;color:#3d5a80;margin-left:6px}
.acct .pos{font-size:11px;color:#4a6080}
.acct .bal{font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:2px}
.acct .pct{font-size:10px;margin-bottom:6px}
.grn{color:#4ade80}.red{color:#f87171}
.bar-bg{height:3px;background:#1a2035;border-radius:2px;overflow:hidden}
.bar{height:100%;border-radius:2px;opacity:.6}
.bar-lbl{font-size:9px;color:#2a3a55;margin-top:3px}
.summary{background:#0d1321;border:1px solid #1a2035;border-radius:8px;padding:12px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:11px}
.summary .k{color:#3d5a80}.summary .v{font-weight:500}
.hist-btn{background:none;border:none;color:#3d5a80;cursor:pointer;font-family:inherit;font-size:11px;padding:4px 0}
.hist{margin-top:8px;max-height:300px;overflow:auto}
.hist-row{padding:6px 8px;border-bottom:1px solid #111827;font-size:10px;display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center}
.reset-wrap{text-align:center;padding-top:8px;border-top:1px solid #111827;margin-top:16px}
.reset{background:none;border:1px solid #1f2020;border-radius:6px;color:#3d3030;padding:8px 24px;font-family:inherit;font-size:11px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr"><h1>NQ RATCHET</h1><p>1000/1500/1700/2200 &middot; D-up A-down &middot; 7+&mu; &middot; 50m cap</p></div>
  <div class="card">
    <div class="lbl">BROKER BALANCE</div>
    <div style="position:relative;margin-bottom:10px">
      <span class="dollar">$</span>
      <input id="balInput" type="text" inputmode="decimal" style="width:100%"/>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:10px;color:#3d5a80;white-space:nowrap">Last traded</span>
      <input id="posInput" type="text" inputmode="numeric" style="width:56px"/>
      <button class="btn" style="flex:1" onclick="doUpdate()">Update</button>
    </div>
  </div>
  <div class="hero" id="hero">
    <div class="sub">NEXT TRADE</div>
    <div><span class="big" id="tradeMain">-</span><span class="inst" id="tradeInst"></span></div>
    <div class="info" id="tradeInfo"></div>
  </div>
  <div class="grid" id="acctGrid"></div>
  <div class="summary" id="summaryGrid"></div>
  <div>
    <button class="hist-btn" onclick="toggleHist()"><span id="histArrow">&#9654;</span> History (<span id="histCount">0</span>)</button>
    <div class="hist" id="histList" style="display:none"></div>
  </div>
  <div class="reset-wrap"><button class="reset" onclick="doReset()">Reset</button></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  RATCHET ENGINE — ported from verified Python (all 56 thresholds pass)
// ═══════════════════════════════════════════════════════════════════════
var SL=150,USD=2,MG_MICRO=100,MG_MINI_T=20,MG_EXTRA=20276,
    C_MNQ=0.95,C_NQ=2.88,CAP=500,DDT=301,EPS=0.5,BUDGET=20000,RT=7;
var PROFS=[
  {l:'A',s:1000,c:'#4ade80'},
  {l:'B',s:1500,c:'#38bdf8'},
  {l:'C',s:1700,c:'#c084fc'},
  {l:'D',s:2200,c:'#fb923c'}
];

function crt(m){return Math.floor(m/10)*C_NQ*2+(m%10)*C_MNQ*2}
function mgn(m){var i=Math.floor(m/10),r=m%10;if(i<=MG_MINI_T)return m*MG_MICRO;return MG_MINI_T*10*MG_MICRO+(i-MG_MINI_T)*MG_EXTRA+r*MG_MICRO}
function r2(x){return Math.round(x*100)/100}

function buildRT(sv){
  var su=Math.max((sv+SL)*USD,SL*USD),st=[],raw=[],tbl=[];
  for(var m=1;m<=10;m++)st.push(m);for(m=20;m<=500;m+=10)st.push(m);
  for(var k=0;k<st.length;k++){m=st[k];raw.push({t:r2(m*su+mgn(m)+DDT*crt(m)),m:m})}
  for(var i=0;i<raw.length;i++){var skip=false;for(var j=i+1;j<raw.length;j++){if(raw[j].t<=raw[i].t&&raw[j].m>raw[i].m){skip=true;break}}if(!skip)tbl.push(raw[i])}
  return tbl;
}

var TABLES=[],DEPS=[];
(function(){
  var base=[];
  for(var i=0;i<4;i++){var su=Math.max((PROFS[i].s+SL)*USD,SL*USD);base.push(su+MG_MICRO+DDT*crt(1));TABLES.push(buildRT(PROFS[i].s))}
  var surplus=BUDGET;for(i=0;i<4;i++)surplus-=base[i];var each=surplus/4;
  for(i=0;i<4;i++)DEPS.push(r2(base[i]+each));
})();

function findStep(bal,tbl){var s=-1;for(var i=0;i<tbl.length;i++){if(bal>=tbl[i].t-EPS)s=i;else break}return s}

function getPos(bal,peak,tbl){
  var cs=findStep(bal,tbl),step=Math.max(cs,peak);
  if(step<0)return{m:0,p:step};
  var mic=tbl[step].m;
  if(bal<mgn(mic)-EPS){var found=false;for(var s=step;s>=0;s--){if(bal>=mgn(tbl[s].m)-EPS){mic=tbl[s].m;found=true;break}}if(!found)return{m:0,p:step}}
  return{m:mic,p:step};
}

function applyCR(pos){
  var a=pos.slice(),ta=0,i;for(i=0;i<4;i++)ta+=a[i];
  if(ta>CAP){var sc=CAP/ta;a=pos.map(function(p){return Math.floor(p*sc)});var rem=CAP;for(i=0;i<4;i++)rem-=a[i];
    var fr=pos.map(function(p,idx){return{f:p*sc-a[idx],i:idx}}).sort(function(x,y){return y.f-x.f});
    for(i=0;i<fr.length&&rem>0;i++){if(pos[fr[i].i]>0){a[fr[i].i]++;rem--}}ta=0;for(i=0;i<4;i++)ta+=a[i]}
  if(ta>9){var mf=Math.floor(ta/10),lo=ta%10;if(lo>0){var rd=lo>=RT?(mf+1)*10:mf*10;if(rd>CAP)rd=mf*10;var df=rd-ta;
    if(df>0)a[3]+=df;else if(df<0){var rm=-df;for(i=0;i<4;i++){var tk=Math.min(a[i],rm);a[i]-=tk;rm-=tk;if(rm<=0)break}}ta=0;for(i=0;i<4;i++)ta+=a[i]}}
  return{a:a,t:ta};
}

// Core: step through all intermediate threshold crossings
function updateTo(accts,targetBroker){
  var bals=accts.map(function(a){return a.bal}),
      peaks=accts.map(function(a){return a.peak}),
      rem=r2(targetBroker-bals.reduce(function(a,b){return a+b},0)),i,ai;

  for(var safe=0;safe<500;safe++){
    if(rem<=0.005&&rem>=-0.005)break;
    var pos=[],rounded,tp=0;
    for(ai=0;ai<4;ai++){var g=getPos(bals[ai],peaks[ai],TABLES[ai]);peaks[ai]=Math.max(peaks[ai],g.p);pos.push(g.m)}
    var cr=applyCR(pos);rounded=cr.a;for(ai=0;ai<4;ai++)tp+=rounded[ai];
    if(tp===0)break;
    var shares=rounded.map(function(r){return r/tp});

    // Find nearest threshold crossing
    var minD=rem;
    for(ai=0;ai<4;ai++){
      if(shares[ai]<=0)continue;
      var cs=findStep(bals[ai],TABLES[ai]),ns=cs+1;
      if(ns>=TABLES[ai].length)continue;
      var needed=TABLES[ai][ns].t-bals[ai];
      if(needed<=EPS)continue;
      var db=needed/shares[ai];
      if(db<minD-0.005)minD=db;
    }
    for(ai=0;ai<4;ai++)bals[ai]=r2(bals[ai]+minD*shares[ai]);
    rem=r2(targetBroker-bals.reduce(function(a,b){return a+b},0));
  }

  // Final positions
  var fpos=[],fpeaks=[];
  for(ai=0;ai<4;ai++){var g2=getPos(bals[ai],peaks[ai],TABLES[ai]);peaks[ai]=Math.max(peaks[ai],g2.p);fpos.push(g2.m);fpeaks.push(peaks[ai])}
  var fcr=applyCR(fpos);
  return{bals:bals,peaks:fpeaks,rounded:fcr.a,total:fcr.t,raw:fpos};
}

// ═══════════════════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════════════════
function fP(m){if(m===0)return'\u2014';var i=Math.floor(m/10),r=m%10;if(i===0)return r+'\u03BC';if(r===0)return i+'m';return i+'m+'+r+'\u03BC'}
function fM(v){if(Math.abs(v)>=1e6)return'$'+(v/1e6).toFixed(2)+'M';return'$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}

var SK='nq-ratchet-v4',state;
function load(){try{var s=localStorage.getItem(SK);return s?JSON.parse(s):null}catch(e){return null}}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){}}

function initState(){
  var accts=PROFS.map(function(p,i){return{l:p.l,s:p.s,bal:DEPS[i],dep:DEPS[i],peak:-1}});
  var u=updateTo(accts,BUDGET);
  return{accts:u.bals.map(function(b,i){return{l:PROFS[i].l,s:PROFS[i].s,bal:b,dep:DEPS[i],peak:u.peaks[i]}}),pos:u.rounded,total:u.total,hist:[]};
}

function render(){
  if(!state)return;
  var totalBal=0,totalDep=0;
  for(var i=0;i<4;i++){totalBal+=state.accts[i].bal;totalDep+=state.accts[i].dep}
  var pos=state.total,mi=Math.floor(pos/10),rm=pos%10;
  var main,inst;
  if(pos===0){main='0';inst=''}
  else if(mi===0){main=''+rm;inst='MNQ'}
  else if(rm===0){main=''+mi;inst='NQ'}
  else{main=mi+'+'+rm;inst='NQ+MNQ'}

  document.getElementById('tradeMain').textContent=main;
  document.getElementById('tradeInst').textContent=inst;
  document.getElementById('tradeInfo').textContent=fP(pos)+' \u00B7 $'+crt(pos).toFixed(2)+' RT';
  document.getElementById('balInput').value=Math.round(totalBal).toLocaleString('en-US');
  document.getElementById('posInput').value=pos;
  document.getElementById('histCount').textContent=(state.hist||[]).length;

  // Account cards
  var grid=document.getElementById('acctGrid');grid.innerHTML='';
  for(var i=0;i<4;i++){
    var a=state.accts[i],p=PROFS[i],pi=state.pos[i],dead=a.bal<=0;
    var st=a.peak,sn=st>=0?st+1:0;
    var tbl=TABLES[i],nxt=(st+1<tbl.length)?tbl[st+1]:null,cur=st>=0?tbl[st]:{t:tbl[0]?tbl[0].t:0};
    var pct=nxt?Math.min(100,Math.max(0,(a.bal-cur.t)/(nxt.t-cur.t)*100)):100;
    var chg=((a.bal/a.dep)-1)*100;
    var d=document.createElement('div');d.className='acct'+(dead?' bust':'');
    var bar='';
    if(!dead&&nxt)bar='<div class="bar-bg"><div class="bar" style="width:'+pct.toFixed(0)+'%;background:'+p.c+'"></div></div><div class="bar-lbl">'+fM(nxt.t-a.bal)+' to step '+(sn+1)+' ('+fP(nxt.m)+')</div>';
    d.innerHTML='<div class="top"><div><span class="letter" style="color:'+p.c+'">'+a.l+'</span><span class="surv">'+a.s+'</span></div><span class="pos">'+(dead?'BUST':fP(pi))+'</span></div>'
      +'<div class="bal">'+(dead?'\u2014':fM(a.bal))+'</div>'
      +'<div class="pct '+(chg>=0?'grn':'red')+'">'+(chg>=0?'+':'')+chg.toFixed(1)+'% \u00B7 step '+sn+'</div>'+bar;
    grid.appendChild(d);
  }

  // Summary
  var pnl=((totalBal/totalDep)-1)*100,alive=state.accts.filter(function(a){return a.bal>0}).length;
  document.getElementById('summaryGrid').innerHTML=
    '<div><span class="k">Total: </span><span class="v" style="color:#e2e8f0">'+fM(totalBal)+'</span></div>'
    +'<div><span class="k">P&L: </span><span class="v '+(pnl>=0?'grn':'red')+'">'+(pnl>=0?'+':'')+pnl.toFixed(1)+'%</span></div>'
    +'<div><span class="k">Alive: </span><span class="v" style="color:#e2e8f0">'+alive+'/4</span></div>'
    +'<div><span class="k">Updates: </span><span class="v" style="color:#e2e8f0">'+(state.hist||[]).length+'</span></div>';
  renderHist();
}

function doUpdate(){
  var bStr=document.getElementById('balInput').value.replace(/[,$\s]/g,'');
  var pStr=document.getElementById('posInput').value.replace(/[^0-9]/g,'');
  var broker=parseFloat(bStr),posTrd=parseInt(pStr)||0;
  if(isNaN(broker)||broker<0)return;

  var oldBal=0;for(var i=0;i<4;i++)oldBal+=state.accts[i].bal;

  // Run threshold-stepping engine
  var u=updateTo(state.accts,broker);

  // Apply stickiness from position-traded input
  var computedTotal=u.total;
  var finalTotal=Math.max(computedTotal,posTrd);

  // If stickiness forces a higher position, use the computed allocation
  // (stickiness only matters during drawdowns; the engine handles step-ups)
  var finalPos=u.rounded;
  if(finalTotal>computedTotal){
    // Keep the previous position allocation pattern
    finalTotal=posTrd;
    finalPos=state.pos;
  }

  state.accts=u.bals.map(function(b,i){return{l:PROFS[i].l,s:PROFS[i].s,bal:b,dep:DEPS[i],peak:u.peaks[i]}});
  state.pos=finalPos;
  state.total=finalTotal;
  state.hist=[{ts:Date.now(),broker:r2(broker),delta:r2(broker-oldBal),total:finalTotal}].concat((state.hist||[]).slice(0,99));
  save(state);render();

  var h=document.getElementById('hero');h.classList.add('flash');setTimeout(function(){h.classList.remove('flash')},600);
}

function doReset(){
  if(!confirm('Reset to initial deposits? Clears all history.'))return;
  state=initState();save(state);render();
}

function toggleHist(){
  var l=document.getElementById('histList'),a=document.getElementById('histArrow');
  if(l.style.display==='none'){l.style.display='block';a.innerHTML='\u25BC';renderHist()}
  else{l.style.display='none';a.innerHTML='\u25B6'}
}

function renderHist(){
  var l=document.getElementById('histList');if(l.style.display==='none')return;l.innerHTML='';
  (state.hist||[]).slice(0,30).forEach(function(h){
    var d=document.createElement('div');d.className='hist-row';
    var dt=new Date(h.ts);
    d.innerHTML='<span style="color:#2a3a55">'+dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+'</span>'
      +'<span style="color:#4a6080">'+fM(h.broker)+'</span>'
      +'<span class="'+(h.delta>=0?'grn':'red')+'">'+(h.delta>=0?'+':'')+fM(Math.abs(h.delta))+'</span>'
      +'<span style="color:#4a6080">'+fP(h.total)+'</span>';
    l.appendChild(d);
  });
}

document.getElementById('balInput').addEventListener('keydown',function(e){if(e.key==='Enter')doUpdate()});
document.getElementById('posInput').addEventListener('keydown',function(e){if(e.key==='Enter')doUpdate()});
state=load()||initState();render();
</script>
</body>
</html>
