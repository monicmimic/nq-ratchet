<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NQ Ratchet</title>
<style>
  :root { --bg:#0c0e14;--card:#111520;--border:#1a2030;--text:#d4d7dd;--dim:#606880;--faint:#404860;--cyan:#4fc3f7;--green:#5ab87a;--red:#e85d4a;--amber:#d4a843;--blue:#4a9de8; }
  * { box-sizing:border-box;margin:0;padding:0; }
  body { font-family:'SF Mono','Menlo','Courier New',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:16px 12px;max-width:480px;margin:0 auto;-webkit-text-size-adjust:100%; }
  .hdr { border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px; }
  .hdr h1 { font-size:11px;color:var(--dim);letter-spacing:2px;font-weight:400; }
  .hdr p { font-size:10px;color:var(--faint);margin-top:2px; }
  .sec { background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px; }
  .lbl { font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:6px; }
  .row { display:flex;gap:8px;margin-bottom:8px; }
  .wrap { position:relative;flex:1; }
  .wrap .pfx { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#506070;font-size:16px; }
  .inp { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 12px 12px 28px;color:#e8eaf0;font-size:18px;font-family:inherit;outline:none; }
  .inp:focus { border-color:#2a4060; }
  .inp.sm { padding-left:12px;font-size:16px;text-align:center; }
  .btn { background:#151a25;border:1px solid #2a4060;border-radius:6px;padding:12px 16px;color:var(--faint);font-size:14px;font-weight:700;font-family:inherit;cursor:default;white-space:nowrap; }
  .btn.act { background:#1a3a5f;color:var(--cyan);cursor:pointer; }
  .pbox { background:#0a1628;border:2px solid #1e3a5f;border-radius:10px;padding:20px 16px;text-align:center;margin-bottom:14px; }
  .pbox.dead { background:#1a0a0a;border-color:#3a1a1a; }
  .pbox .lb { font-size:11px;color:var(--dim);letter-spacing:1px; }
  .pbox .sz { font-size:44px;font-weight:800;color:var(--cyan);margin-top:4px;line-height:1.1; }
  .pbox.dead .sz { color:var(--red); }
  .pbox .mt { font-size:12px;color:#506070;margin-top:6px; }
  .grd { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px; }
  .ac { background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px; }
  .ac.dead { border-color:#2a1515;opacity:0.45; }
  .ach { display:flex;justify-content:space-between;align-items:center; }
  .acn { font-size:13px;font-weight:700; }
  .acs { font-weight:400;font-size:10px;color:#506070; }
  .acp { font-size:12px;color:#8090a0; }
  .acb { font-size:16px;font-weight:600;color:#c8ccd4;margin-top:4px; }
  .acpc { font-size:10px;margin-top:2px; }
  .pb { height:3px;background:#1a2030;border-radius:2px;overflow:hidden;margin-top:5px; }
  .pf { height:100%;border-radius:2px;opacity:0.5; }
  .pl { font-size:9px;color:var(--faint);margin-top:2px; }
  .note { font-size:10px;color:var(--faint);margin-top:4px; }
  .hb { background:transparent;border:none;color:#506070;font-size:11px;cursor:pointer;font-family:inherit;padding:4px 0; }
  .hr { display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--card);font-size:11px; }
  .ra { text-align:center;margin-top:20px;padding-bottom:24px; }
  .rb { background:transparent;border:1px solid var(--border);border-radius:6px;padding:8px 24px;color:var(--faint);font-size:11px;font-family:inherit;cursor:pointer; }
  .rb.cf { background:#3a1515;border-color:#5a2020;color:var(--red); }
  .cb { background:transparent;border:1px solid var(--border);border-radius:6px;padding:8px 16px;color:#506070;font-size:11px;font-family:inherit;cursor:pointer;margin-left:8px; }
</style>
</head>
<body>
<div class="hdr"><h1>NQ RATCHET</h1><p>1000/1500/1700/2200 &mdash; D-up A-down &mdash; 7+ &mdash; 50m cap</p></div>

<div class="sec">
  <div class="lbl">BROKER BALANCE</div>
  <div class="row">
    <div class="wrap"><span class="pfx">$</span>
    <input type="text" inputmode="decimal" id="bi" class="inp" placeholder=""></div>
  </div>
  <div class="lbl">POSITION TRADED (total micros)</div>
  <div class="row">
    <div class="wrap"><input type="text" inputmode="numeric" id="pi" class="inp sm" placeholder=""></div>
    <button id="ub" class="btn" onclick="doUp()">Update</button>
  </div>
  <div id="dp" class="note"></div>
</div>

<div id="pb" class="pbox">
  <div class="lb">NEXT TRADE</div>
  <div class="sz" id="ts">&mdash;</div>
  <div class="mt" id="tm"></div>
</div>

<div class="grd" id="ag"></div>

<div><button class="hb" id="hb" onclick="tH()">&#9654; History (0)</button>
<div id="hl" style="max-height:220px;overflow-y:auto;margin-top:6px;display:none"></div></div>

<div class="ra">
  <button id="xrb" class="rb" onclick="doR()">Reset</button>
  <button id="xcb" class="cb" onclick="cR()" style="display:none">Cancel</button>
</div>

<script>
var SV = [1000, 1500, 1700, 2200];
var DP = [3800.0, 4800.0, 5200.0, 6200.0];
var LB = ["A", "B", "C", "D"];
var CL = ["#e85d4a", "#d4a843", "#4a9de8", "#5ab87a"];
var CAP = 500;
var RTH = 7;
var CNQ = 2.88;
var CMQ = 0.95;
var SK = "nq-ratchet-v8";

/* Monotonic ratchet tables: [threshold, micros] */
var RT = [
  [[2971.9,1],[5943.8,2],[8915.7,3],[11887.6,4],[14859.5,5],[17831.4,6],[20803.3,7],[23775.2,8],[25733.76,10],[51467.52,20],[77201.28,30],[102935.04,40],[128668.8,50],[154402.56,60],[180136.32,70],[205870.08,80],[231603.84,90],[257337.6,100],[283071.36,110],[308805.12,120],[334538.88,130],[360272.64,140],[386006.4,150],[411740.16,160],[437473.92,170],[463207.68,180],[488941.44,190],[514675.2,200],[559684.96,210],[604694.72,220],[649704.48,230],[694714.24,240],[739724.0,250],[784733.76,260],[829743.52,270],[874753.28,280],[919763.04,290],[964772.8,300],[1009782.56,310],[1054792.32,320],[1099802.08,330],[1144811.84,340],[1189821.6,350],[1234831.36,360],[1279841.12,370],[1324850.88,380],[1369860.64,390],[1414870.4,400],[1459880.16,410],[1504889.92,420],[1549899.68,430],[1594909.44,440],[1639919.2,450],[1684928.96,460],[1729938.72,470],[1774948.48,480],[1819958.24,490],[1864968.0,500]],
  [[3971.9,1],[7943.8,2],[11915.7,3],[15887.6,4],[19859.5,5],[23831.4,6],[27803.3,7],[31775.2,8],[35733.76,10],[71467.52,20],[107201.28,30],[142935.04,40],[178668.8,50],[214402.56,60],[250136.32,70],[285870.08,80],[321603.84,90],[357337.6,100],[393071.36,110],[428805.12,120],[464538.88,130],[500272.64,140],[536006.4,150],[571740.16,160],[607473.92,170],[643207.68,180],[678941.44,190],[714675.2,200],[769684.96,210],[824694.72,220],[879704.48,230],[934714.24,240],[989724.0,250],[1044733.76,260],[1099743.52,270],[1154753.28,280],[1209763.04,290],[1264772.8,300],[1319782.56,310],[1374792.32,320],[1429802.08,330],[1484811.84,340],[1539821.6,350],[1594831.36,360],[1649841.12,370],[1704850.88,380],[1759860.64,390],[1814870.4,400],[1869880.16,410],[1924889.92,420],[1979899.68,430],[2034909.44,440],[2089919.2,450],[2144928.96,460],[2199938.72,470],[2254948.48,480],[2309958.24,490],[2364968.0,500]],
  [[4371.9,1],[8743.8,2],[13115.7,3],[17487.6,4],[21859.5,5],[26231.4,6],[30603.3,7],[34975.2,8],[39347.1,9],[39733.76,10],[79467.52,20],[119201.28,30],[158935.04,40],[198668.8,50],[238402.56,60],[278136.32,70],[317870.08,80],[357603.84,90],[397337.6,100],[437071.36,110],[476805.12,120],[516538.88,130],[556272.64,140],[596006.4,150],[635740.16,160],[675473.92,170],[715207.68,180],[754941.44,190],[794675.2,200],[853684.96,210],[912694.72,220],[971704.48,230],[1030714.24,240],[1089724.0,250],[1148733.76,260],[1207743.52,270],[1266753.28,280],[1325763.04,290],[1384772.8,300],[1443782.56,310],[1502792.32,320],[1561802.08,330],[1620811.84,340],[1679821.6,350],[1738831.36,360],[1797841.12,370],[1856850.88,380],[1915860.64,390],[1974870.4,400],[2033880.16,410],[2092889.92,420],[2151899.68,430],[2210909.44,440],[2269919.2,450],[2328928.96,460],[2387938.72,470],[2446948.48,480],[2505958.24,490],[2564968.0,500]],
  [[5371.9,1],[10743.8,2],[16115.7,3],[21487.6,4],[26859.5,5],[32231.4,6],[37603.3,7],[42975.2,8],[48347.1,9],[49733.76,10],[99467.52,20],[149201.28,30],[198935.04,40],[248668.8,50],[298402.56,60],[348136.32,70],[397870.08,80],[447603.84,90],[497337.6,100],[547071.36,110],[596805.12,120],[646538.88,130],[696272.64,140],[746006.4,150],[795740.16,160],[845473.92,170],[895207.68,180],[944941.44,190],[994675.2,200],[1063684.96,210],[1132694.72,220],[1201704.48,230],[1270714.24,240],[1339724.0,250],[1408733.76,260],[1477743.52,270],[1546753.28,280],[1615763.04,290],[1684772.8,300],[1753782.56,310],[1822792.32,320],[1891802.08,330],[1960811.84,340],[2029821.6,350],[2098831.36,360],[2167841.12,370],[2236850.88,380],[2305860.64,390],[2374870.4,400],[2443880.16,410],[2512889.92,420],[2581899.68,430],[2650909.44,440],[2719919.2,450],[2788928.96,460],[2857938.72,470],[2926948.48,480],[2995958.24,490],[3064968.0,500]]
];

function cR2(m) { return Math.floor(m/10)*CNQ*2 + (m%10)*CMQ*2; }

function marginF(m) {
  var mi = Math.floor(m/10), r = m%10;
  if (mi <= 20) return m * 100;
  return 20*10*100 + (mi-20)*20276 + r*100;
}

function fm(m) {
  var mi = Math.floor(m/10), r = m%10;
  if (mi === 0) return r + "\u03BC";
  if (r === 0) return mi + "m";
  return mi + "m+" + r + "\u03BC";
}

function fo(t) {
  if (!t) return "\u2014";
  var mi = Math.floor(t/10), r = t%10;
  if (r === 0 && mi > 0) return mi + " NQ";
  if (mi === 0) return r + " MNQ";
  return mi + " NQ + " + r + " MNQ";
}

function fu(v) { return "$" + Math.round(v).toLocaleString(); }

/* Compute per-account theoretical positions from balances and peak steps.
   Returns: { ac: [{b, a, th, ac, s, ps}x4], ta: total_actual } */
function computePos(bals, peaks) {
  var ac = [];
  var at = [];
  var i, si, cs, p, tm, r;

  for (i = 0; i < 4; i++) {
    if (bals[i] <= 0) {
      ac.push({b:0, a:false, th:0, ac:0, s:-1, ps:peaks[i]});
      at.push(0);
      continue;
    }
    cs = -1;
    r = RT[i];
    for (si = 0; si < r.length; si++) {
      if (bals[i] >= r[si][0]) cs = si;
      else break;
    }
    p = Math.max(cs, peaks[i]);
    if (p < 0) {
      ac.push({b:bals[i], a:false, th:0, ac:0, s:-1, ps:p});
      at.push(0);
      continue;
    }
    tm = r[p][1];
    if (bals[i] < marginF(tm)) {
      for (si = p; si >= 0; si--) {
        if (bals[i] >= marginF(r[si][1])) { tm = r[si][1]; break; }
      }
    }
    ac.push({b:bals[i], a:true, th:tm, ac:tm, s:p, ps:p});
    at.push(tm);
  }

  var tt = at[0]+at[1]+at[2]+at[3];

  /* Combined cap */
  if (tt > CAP) {
    var sc = CAP / tt;
    at = [Math.floor(ac[0].th*sc), Math.floor(ac[1].th*sc), Math.floor(ac[2].th*sc), Math.floor(ac[3].th*sc)];
    var rm = CAP - (at[0]+at[1]+at[2]+at[3]);
    var fr = [0,1,2,3].sort(function(a,b) {
      var fa = ac[a].a ? ac[a].th*sc - at[a] : -1;
      var fb = ac[b].a ? ac[b].th*sc - at[b] : -1;
      return fb - fa;
    });
    for (var k = 0; k < fr.length && rm > 0; k++) {
      if (ac[fr[k]].a) { at[fr[k]]++; rm--; }
    }
    tt = at[0]+at[1]+at[2]+at[3];
  }

  /* D-up / A-down rounding at 7+μ */
  if (tt > 9) {
    var mf = Math.floor(tt/10);
    var lf = tt % 10;
    if (lf > 0) {
      var rd = (lf >= RTH) ? (mf+1)*10 : mf*10;
      if (rd > CAP) rd = mf*10;
      var df = rd - tt;
      if (df > 0) {
        at[3] += df;
      } else if (df < 0) {
        var rm2 = -df;
        for (var x = 0; x < 4 && rm2 > 0; x++) {
          var tk = Math.min(at[x], rm2);
          at[x] -= tk;
          rm2 -= tk;
        }
      }
      tt = at[0]+at[1]+at[2]+at[3];
    }
  }

  for (i = 0; i < 4; i++) ac[i].ac = at[i];
  return { ac: ac, ta: tt };
}

function mkDefault() {
  return { b: DP.slice(), ps: [-1,-1,-1,-1], h: [] };
}

function lS() {
  try { var s = localStorage.getItem(SK); if (s) return JSON.parse(s); } catch(e) {}
  return mkDefault();
}

function sS() {
  try { localStorage.setItem(SK, JSON.stringify(st)); } catch(e) {}
}

var st = null;
var cfReset = false;
var hv = false;

function rn() {
  var bals = st.b;
  var peaks = st.ps;
  var res = computePos(bals, peaks);
  var ac = res.ac;
  var ta = res.ta;
  var totalBal = bals[0]+bals[1]+bals[2]+bals[3];
  var anyAlive = ac[0].a || ac[1].a || ac[2].a || ac[3].a;
  var comm = cR2(ta);

  document.getElementById("bi").placeholder = Math.round(totalBal).toLocaleString();
  document.getElementById("pi").placeholder = ta > 0 ? ta.toString() : "\u2014";

  var box = document.getElementById("pb");
  box.className = "pbox" + (anyAlive ? "" : " dead");
  document.getElementById("ts").textContent = anyAlive ? fo(ta) : "ALL BUSTED";
  document.getElementById("tm").textContent = (anyAlive && ta > 0)
    ? fm(ta) + " \u2014 $" + comm.toFixed(2) + " RT"
    : "";

  /* Account cards */
  var g = document.getElementById("ag");
  g.innerHTML = "";
  for (var i = 0; i < 4; i++) {
    var a = ac[i];
    var bal = bals[i];
    var pct = DP[i] > 0 ? ((bal - DP[i]) / DP[i] * 100) : 0;
    var rt = RT[i];
    var nextTh = (a.s >= 0 && a.s + 1 < rt.length) ? rt[a.s+1][0] : null;
    var prog = (nextTh && bal > 0 && a.s >= 0)
      ? Math.min(100, Math.max(0, (bal - rt[a.s][0]) / (nextTh - rt[a.s][0]) * 100))
      : 0;

    var c = document.createElement("div");
    c.className = "ac" + (a.a ? "" : " dead");

    var s = '<div class="ach">' +
      '<span class="acn" style="color:' + CL[i] + '">' + LB[i] +
      ' <span class="acs">' + SV[i] + '</span></span>' +
      '<span class="acp" style="color:' + (a.a ? "#8090a0" : "#804040") + '">' +
      (a.a ? fm(a.ac) : "BUST") + '</span></div>';
    s += '<div class="acb">' + fu(bal) + '</div>';
    s += '<div class="acpc" style="color:' + (pct >= 0 ? "var(--green)" : "var(--red)") + '">' +
      (pct >= 0 ? "+" : "") + pct.toFixed(1) + '% \u2014 step ' + (a.s+1) + '</div>';
    if (a.a && nextTh) {
      s += '<div class="pb"><div class="pf" style="width:' + prog + '%;background:' + CL[i] + '"></div></div>';
      s += '<div class="pl">' + fu(nextTh - bal) + ' to step ' + (a.s+2) + '</div>';
    }
    c.innerHTML = s;
    g.appendChild(c);
  }

  /* History */
  document.getElementById("hb").textContent = (hv ? "\u25BC" : "\u25B6") + " History (" + st.h.length + ")";
  var hl = document.getElementById("hl");
  if (hv && st.h.length > 0) {
    hl.style.display = "block";
    hl.innerHTML = "";
    var sh = st.h.slice().reverse().slice(0, 40);
    for (var j = 0; j < sh.length; j++) {
      var e = sh[j];
      hl.innerHTML += '<div class="hr">' +
        '<span style="color:var(--faint)">' + new Date(e.t).toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit"}) +
        " " + new Date(e.t).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}) + '</span>' +
        '<span style="color:#707880">' + fm(e.p) + '</span>' +
        '<span style="color:' + (e.d >= 0 ? "var(--green)" : "var(--red)") + '">' +
        (e.d >= 0 ? "+" : "") + "$" + Math.round(e.d).toLocaleString() + '</span>' +
        '<span style="color:#707880">' + fu(e.v) + '</span></div>';
    }
  } else {
    hl.style.display = "none";
  }
}

function doUp() {
  var rawBal = document.getElementById("bi").value.replace(/[,$\s]/g, "");
  var nb = parseFloat(rawBal);
  if (isNaN(nb) || nb < 0) return;

  /* Get current state */
  var bals = st.b;
  var peaks = st.ps;
  var res = computePos(bals, peaks);
  var ac = res.ac;
  var totalBal = bals[0]+bals[1]+bals[2]+bals[3];
  var delta = nb - totalBal;

  /* Read position traded — user confirms what they actually traded */
  var rawPos = document.getElementById("pi").value.replace(/[,$\s]/g, "");
  var traded = rawPos ? parseInt(rawPos) : res.ta;
  if (isNaN(traded) || traded <= 0) traded = res.ta;

  /* Build per-account shares from the traded position.
     If traded matches current recommendation, use current breakdown.
     If different, scale proportionally from current breakdown. */
  var curBreakdown = [ac[0].ac, ac[1].ac, ac[2].ac, ac[3].ac];
  var curTotal = curBreakdown[0]+curBreakdown[1]+curBreakdown[2]+curBreakdown[3];

  var shares = [0, 0, 0, 0];
  if (curTotal > 0) {
    for (var i = 0; i < 4; i++) {
      shares[i] = curBreakdown[i] / curTotal;
    }
  }

  /* Allocate delta to virtual accounts */
  var newBals = bals.slice();
  if (delta !== 0 && curTotal > 0) {
    for (var i = 0; i < 4; i++) {
      if (shares[i] > 0) {
        newBals[i] = bals[i] + delta * shares[i];
        if (newBals[i] < 0) newBals[i] = 0;
      }
    }
  }

  /* Update peak steps (ratchet never steps down) */
  var newPeaks = peaks.slice();
  for (var i = 0; i < 4; i++) {
    if (newBals[i] > 0) {
      var cs = -1;
      for (var si = 0; si < RT[i].length; si++) {
        if (newBals[i] >= RT[i][si][0]) cs = si;
        else break;
      }
      newPeaks[i] = Math.max(cs, peaks[i]);
    }
  }

  /* Save */
  st.h.push({ t: Date.now(), v: nb, d: delta, p: traded, b: newBals.slice() });
  st.b = newBals;
  st.ps = newPeaks;
  sS();

  document.getElementById("bi").value = "";
  document.getElementById("pi").value = "";
  document.getElementById("dp").innerHTML = "";
  rn();
}

function doR() {
  if (!cfReset) {
    cfReset = true;
    document.getElementById("xrb").className = "rb cf";
    document.getElementById("xrb").textContent = "Confirm reset";
    document.getElementById("xcb").style.display = "inline-block";
    return;
  }
  st = mkDefault();
  sS();
  cfReset = false;
  document.getElementById("xrb").className = "rb";
  document.getElementById("xrb").textContent = "Reset";
  document.getElementById("xcb").style.display = "none";
  rn();
}

function cR() {
  cfReset = false;
  document.getElementById("xrb").className = "rb";
  document.getElementById("xrb").textContent = "Reset";
  document.getElementById("xcb").style.display = "none";
}

function tH() { hv = !hv; rn(); }

/* Live preview */
document.getElementById("bi").addEventListener("input", function() {
  var raw = this.value.replace(/[,$\s]/g, "");
  var nb = parseFloat(raw);
  var btn = document.getElementById("ub");
  var pv = document.getElementById("dp");
  if (!this.value || isNaN(nb) || nb < 0) { btn.className = "btn"; pv.innerHTML = ""; return; }
  btn.className = "btn act";
  var totalBal = st.b[0]+st.b[1]+st.b[2]+st.b[3];
  var d = nb - totalBal;
  pv.style.color = d >= 0 ? "var(--green)" : "var(--red)";
  pv.textContent = (d >= 0 ? "+" : "") + "$" + Math.round(d).toLocaleString();
